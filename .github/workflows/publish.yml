name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Configure a "pypi" environment in repo Settings → Environments before tagging.
    # Required for trusted publishing approval and as an extra release safeguard.
    environment:
      name: pypi
      url: https://pypi.org/p/cap-augmentation
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
